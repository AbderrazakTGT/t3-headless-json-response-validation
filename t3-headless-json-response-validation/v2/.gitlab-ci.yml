# =============================================================================
# .gitlab-ci.yml
# Pipeline TYPO3 Headless — Stratégie de validation JSON
#
# ⚠️  SÉCURITÉ :
#   - Aucune base de production utilisée
#   - Les fixtures sont générées synthétiquement à la volée
#   - Les snapshots sont des artifacts éphémères (expire_in: 1 hour)
#   - Nettoyage automatique après chaque job
#   - Aucun CSV ni snapshot ne persiste dans les runners
# =============================================================================

stages:
  - prepare    # génération des fixtures + snapshots synthétiques
  - test       # validation schemas + tests fonctionnels PHPUnit
  - e2e        # tests Playwright (optionnel)
  - security   # audit dépendances
  - notification

variables:
  # TYPO3 Testing Framework — base gérée par le framework lui-même
  typo3DatabaseHost: mysql
  typo3DatabaseName: typo3_test
  typo3DatabaseUsername: root
  typo3DatabasePassword: root
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: typo3_test

  COMPOSER_CACHE_DIR: .cache/composer
  FF_USE_FASTZIP: "true"

cache:
  key: "$CI_COMMIT_REF_SLUG-composer"
  paths:
    - .cache/composer
    - vendor/

# =============================================================================
# STAGE : prepare
# Génère les fixtures synthétiques + snapshots — artifacts éphémères
# =============================================================================

prepare:fixtures:
  stage: prepare
  image: typo3/core-testing-php82:latest
  services:
    - name: mysql:8.0
      alias: mysql
  before_script:
    - composer install --no-progress --prefer-dist --no-interaction
  script:
    # 1. Générer les fixtures CSV synthétiques (sans base de production)
    - chmod +x Tests/Scripts/*.sh
    - ./Tests/Scripts/generate_fixtures.sh

    # 2. Générer les snapshots initiaux
    - |
      UPDATE_SNAPSHOTS=1 vendor/bin/phpunit \
        -c typo3/sysext/core/Build/FunctionalTests.xml \
        Tests/Functional/Headless \
        --testdox

    # 3. Vérifier les snapshots générés
    - ./Tests/Scripts/verify_snapshots.sh

  artifacts:
    # ⚠️  expire_in court : données éphémères, jamais persistées longtemps
    expire_in: 1 hour
    paths:
      - Tests/Fixtures/Database/
      - Tests/Fixtures/Snapshots/
  only:
    - merge_requests
    - main

# =============================================================================
# STAGE : test — Tests fonctionnels PHPUnit
# =============================================================================

test:headless:
  stage: test
  image: typo3/core-testing-php82:latest
  services:
    - name: mysql:8.0
      alias: mysql
  needs:
    - job: prepare:fixtures
      artifacts: true
  before_script:
    - composer install --no-progress --prefer-dist --no-interaction
  script:
    # Vérification préalable des snapshots (rapide ~5s)
    - ./Tests/Scripts/verify_snapshots.sh

    # Tests fonctionnels complets
    - |
      vendor/bin/phpunit \
        -c typo3/sysext/core/Build/FunctionalTests.xml \
        Tests/Functional/Headless \
        --testdox \
        --log-junit typo3temp/var/tests/headless.xml

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - typo3temp/var/tests/
    reports:
      junit:
        - typo3temp/var/tests/*.xml

  after_script:
    # Nettoyage sécurité — supprimer les données générées du runner
    - rm -rf Tests/Fixtures/Database/ || true
    - rm -rf Tests/Fixtures/Snapshots/ || true

  only:
    - merge_requests
    - main

# =============================================================================
# STAGE : e2e — Tests Playwright (repo dédié)
# Optionnel — utilise les snapshots générés en stage prepare
# =============================================================================

test:playwright:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.41.0-focal
  needs:
    - job: prepare:fixtures
      artifacts: true
  allow_failure: true  # ne bloque pas la MR si Playwright échoue
  variables:
    BASE_URL: "http://typo3:80"
  script:
    - cd playwright
    - npm ci
    - npx playwright test --reporter=junit --output=../playwright-results
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - playwright-results/
    reports:
      junit:
        - playwright-results/*.xml
  after_script:
    - rm -rf Tests/Fixtures/Snapshots/ || true
  only:
    - merge_requests
    - main

# =============================================================================
# STAGE : security
# =============================================================================

security:dependencies:
  stage: security
  image: typo3/core-testing-php82:latest
  before_script:
    - composer install --no-progress --prefer-dist --no-interaction
  script:
    - composer audit || true
    - composer require --dev typo3/security-checker --no-interaction || true
    - vendor/bin/security-checker security:check || true
  allow_failure: true
  only:
    - main

# =============================================================================
# STAGE : notification — Slack
# =============================================================================

notify:slack:
  stage: notification
  image: curlimages/curl:latest
  script:
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        MSG="✅ Tests headless OK — ${CI_COMMIT_REF_NAME} (${CI_COMMIT_SHORT_SHA})"
      else
        MSG="❌ Tests headless FAILED — ${CI_COMMIT_REF_NAME} — ${CI_PIPELINE_URL}"
      fi
      curl -s -X POST -H 'Content-type: application/json' \
        --data "{\"text\":\"${MSG}\"}" \
        "${SLACK_WEBHOOK_URL}"
  when: always
  only:
    - merge_requests
    - main
