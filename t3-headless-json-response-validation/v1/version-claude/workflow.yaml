# Fichier: .gitlab-ci.yml

stages:
  - test
  - security
  - notification

variables:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: typo3_test
  MYSQL_USER: typo3
  MYSQL_PASSWORD: typo3
  # [CORRECTIF] Variables attendues par le TYPO3 Testing Framework
  # Le framework crée/détruit sa propre base, ces variables lui sont passées directement.
  typo3DatabaseHost: mysql
  typo3DatabaseName: typo3_test
  typo3DatabaseUsername: root
  typo3DatabasePassword: root
  COMPOSER_CACHE_DIR: .cache/composer

cache:
  paths:
    - .cache
    - vendor/
    - typo3temp/

before_script:
  - apt-get update && apt-get install -y jq
  - composer install --no-progress --prefer-dist

# Étape 1: Vérification des snapshots
verify_snapshots:
  stage: test
  script:
    - chmod +x Tests/Scripts/verify_snapshots.sh
    - ./Tests/Scripts/verify_snapshots.sh
  only:
    - merge_requests
    - main

# Étape 2: Tests fonctionnels headless
test:headless:
  stage: test
  # [CORRECTIF] PHP 8.2 minimum requis pour TYPO3 v13 (8.1 n'est plus supporté)
  image: typo3/core-testing-php82:latest
  services:
    # [CORRECTIF] MySQL 8.0 recommandé pour TYPO3 v13 (5.7 déprécié)
    - name: mysql:8.0
      alias: mysql
  # [CORRECTIF] Suppression du bloc mysqladmin create.
  # Le TYPO3 Testing Framework crée et détruit lui-même la base temporaire
  # via les variables typo3Database*. Créer la DB manuellement entrait en conflit.
  script:
    - vendor/bin/phpunit
        -c typo3/sysext/core/Build/FunctionalTests.xml
        Tests/Functional/Headless
        --testdox
        --log-junit typo3temp/var/tests/headless.xml
  artifacts:
    paths:
      - typo3temp/var/tests/
    reports:
      junit:
        - typo3temp/var/tests/*.xml
    when: always
  only:
    - merge_requests
    - main

# Étape 3: Vérification de sécurité (optionnel)
security_scan:
  stage: security
  script:
    - composer require --dev typo3/security-checker
    - vendor/bin/security-checker security:check
  allow_failure: true
  only:
    - main

# Étape 4: Notification
notify_slack:
  stage: notification
  script:
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        curl -X POST -H 'Content-type: application/json' \
        --data "{\"text\":\"✅ Tests headless passés avec succès pour $CI_COMMIT_REF_NAME\"}" \
        $SLACK_WEBHOOK_URL
      else
        curl -X POST -H 'Content-type: application/json' \
        --data "{\"text\":\"❌ Échec des tests headless pour $CI_COMMIT_REF_NAME - $CI_PIPELINE_URL\"}" \
        $SLACK_WEBHOOK_URL
      fi
  only:
    - merge_requests
  when: always
